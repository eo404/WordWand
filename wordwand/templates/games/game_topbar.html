{% load static %}
{% comment %}
Include at the top of every game template like this:

{% include "games/game_topbar.html"
   with game_title="Sound Match"
   game_emoji="🎧" %}
{% endcomment %}
<div class="game-topbar">
    <a href="{% url 'menu' %}" class="gtb-back">
        <span class="gtb-back-arrow">←</span>
        <span>Games</span>
    </a>
    <div class="gtb-title">
        <span class="gtb-emoji">{{ game_emoji }}</span>
        <span>{{ game_title }}</span>
    </div>
</div>

<style>
    @import url("{% static 'css/_shared.css' %}");

    .game-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 26px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .gtb-back {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: "Fredoka", sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.08);
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        color: rgba(240, 234, 214, 0.72);
        padding: 7px 14px;
        border-radius: 10px;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
    }
    .gtb-back:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
    }
    .gtb-back-arrow {
        font-size: 1rem;
    }

    .gtb-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "Fredoka", sans-serif;
        font-size: 1.15rem;
        font-weight: 700;
        color: rgba(240, 234, 214, 0.9);
        letter-spacing: 1px;
    }
    .gtb-emoji {
        font-size: 1.3rem;
    }

    .gtb-progress {
        font-family: "Fredoka", sans-serif;
        font-size: 0.88rem;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.07);
        border: 1.5px solid rgba(255, 255, 255, 0.14);
        color: rgba(240, 234, 214, 0.6);
        padding: 7px 14px;
        border-radius: 10px;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
    }
    .gtb-progress:hover {
        background: rgba(255, 255, 255, 0.14);
        color: white;
    }
</style>
