{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordWand – Read & Listen</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Base scene: body bg, .bunting, .teacher, .main-board, .control-panel -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    <!-- TTS popup/syllable animations -->
    <link rel="stylesheet" href="{% static 'css/tts_engine.css' %}">

    <style>
        /* ─── BOARD INNER LAYOUT ───────────────────────────── */
        .main-board {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 60px 44px;
        }

        /* ─── TITLE ────────────────────────────────────────── */
        .reader-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            color: rgba(240, 234, 214, 0.93);
            letter-spacing: 3px;
            text-shadow:
                2px 2px 0 rgba(0, 0, 0, 0.45),
                0 0 30px rgba(255, 255, 255, 0.06);
            text-align: center;
            margin-bottom: 26px;
        }

        /* ─── UPLOAD SECTION ───────────────────────────────── */
        .upload-section {
            background: transparent !important;
            border: 2px dashed rgba(255, 255, 255, 0.42) !important;
            border-radius: 14px !important;
            padding: 22px 36px !important;
            width: 100%;
            max-width: 740px;
            margin-bottom: 28px;
            text-align: center;
        }

        .chalk-upload-form {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Solid chalk button — Choose File */
        .chalk-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.88);
            color: rgba(255, 255, 255, 0.92);
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px 26px;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 0.5px;
            display: inline-block;
            transition: background 0.2s, transform 0.15s;
        }

        .chalk-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        /* Dashed chalk button — Read File */
        .chalk-btn-outline {
            background: transparent;
            border: 2px dashed rgba(255, 255, 255, 0.80);
            color: rgba(255, 255, 255, 0.92);
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px 26px;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s, transform 0.15s;
        }

        .chalk-btn-outline:hover {
            background: rgba(255, 255, 255, 0.10);
            transform: translateY(-2px);
        }

        .file-name {
            color: rgba(255, 255, 255, 0.72);
            font-family: 'Fredoka', sans-serif;
            font-size: 0.95rem;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── ERROR ────────────────────────────────────────── */
        .error-message {
            color: #ff8a80;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            margin-bottom: 14px;
            text-align: center;
        }

        /* ─── DETECTED TEXT CARD (blue, as in screenshot 2) ── */
        .text-display-section {
            width: 100%;
            max-width: 860px;
            background: #1e83e7;
            border-radius: 16px;
            padding: 24px 28px;
            margin-top: 0;
        }

        .text-display-section h3 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── TEXT CONTAINER ───────────────────────────────── */
        #text-container {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            line-height: 2.4;
            background: transparent !important;
            color: white;
            min-height: 60px;
        }

        /* ─── WORD SPANS ───────────────────────────────────── */
        .word {
            display: inline-block;
            padding: 5px 10px;
            margin: 3px 2px;
            border-radius: 8px;
            color: white;
            transition: background 0.2s;
        }

        /* Hard words — yellow pill, exactly as in screenshot */
        .hard-word {
            background: #f3ce57;
            color: #1a1a1a !important;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .hard-word:hover {
            background: #ffd94a;
            transform: scale(1.06);
        }

        /* TTS reading highlight */
        .highlight {
            background: #55efc4 !important;
            color: #000 !important;
            box-shadow: 0 0 8px rgba(85, 239, 196, 0.7);
        }

        /* ─── CONTROL PANEL ────────────────────────────────── */
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .control-panel button {
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 11px 28px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            background: rgba(255, 255, 255, 0.13);
            color: rgba(255, 255, 255, 0.95);
            transition: background 0.2s, transform 0.15s;
            letter-spacing: 0.3px;
        }

        .control-panel button:hover {
            background: rgba(255, 255, 255, 0.22);
            transform: translateY(-3px);
        }

        /* ─── POPUP OVERLAY ────────────────────────────────── */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 24, 32, 0.70);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .popup.hidden {
            display: none !important;
        }

        /* ─── POPUP CARD ───────────────────────────────────── */
        .popup-content {
            background: #ffffff;
            padding: 36px 32px 28px;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.3rem;
            cursor: pointer;
            color: #b2bec3;
            transition: color 0.15s;
            line-height: 1;
        }

        .close-btn:hover {
            color: #d63031;
        }

        #popup-word {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 16px;
        }

        /* ─── SYLLABLE BOXES ───────────────────────────────── */
        #letter-box {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 8px 0 22px;
        }

        .syllable-box {
            background: #f3ce57;
            border: 2px solid #e6b800;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c3e50;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.5);
            animation: popIn 0.45s ease forwards;
            transition: background 0.15s, transform 0.15s;
        }

        .syllable-box:hover {
            background: #ffd94a;
            transform: scale(1.1);
        }

        /* Popup action buttons */
        .popup-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .popup-actions button {
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .popup-actions button:hover {
            transform: translateY(-2px);
        }

        .btn-hear {
            background: #2eaa9a;
            color: white;
        }

        .btn-hear:hover {
            background: #27968a;
        }

        .btn-close {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .btn-close:hover {
            background: #dfe6e9;
        }

        /* ─── ANIMATIONS ───────────────────────────────────── */
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -260%) scale(2.2);
            }
        }
    </style>
</head>

<body>

    <!-- ── BUNTING IMAGE (from static/images/banner.png) ── -->
    <img src="{% static 'images/banner.png' %}" class="bunting" alt="">

    <!-- ── TEACHER IMAGE (from static/images/teacher.png) ── -->
    <img src="{% static 'images/teacher.png' %}" class="teacher" alt="">

    <!-- ── SCENE ── -->
    <main>

        <div class="main-board">

            <!-- Title -->
            <h2 class="reader-title">Read &amp; Listen</h2>

            <!-- Upload section -->
            <div class="upload-section">
                <form method="POST" enctype="multipart/form-data" class="chalk-upload-form">
                    {% csrf_token %}

                    <!-- Hidden real input -->
                    <input type="file" id="fileInput" name="file" accept=".txt,.pdf,.png,.jpg,.jpeg" required hidden>

                    <!-- Styled label -->
                    <label for="fileInput" class="chalk-btn">Choose File</label>

                    <!-- File name feedback -->
                    <span id="fileName" class="file-name"></span>

                    <!-- Submit -->
                    <button type="submit" class="chalk-btn-outline">Read File</button>
                </form>
            </div>

            {% if error %}
            <div class="error-message">⚠️ {{ error }}</div>
            {% endif %}

            {% if text %}
            <!-- Detected text (blue card) -->
            <div class="text-display-section">
                <h3>🔲 Detected Text</h3>
                <div id="text-container"></div>
            </div>

            <!-- Playback controls -->
            <div class="control-panel">
                <button onclick="readNormal()">▶ Read</button>
                <button onclick="readSlow()">Slow</button>
                <button onclick="stopSpeech()">⏹ Stop</button>
            </div>
            {% endif %}

        </div><!-- /.main-board -->

    </main><!-- /main -->

    <!-- ── DJANGO → JS ── -->
    <script>
        const OCR_TEXT = "{{ text|escapejs }}";
        const HARD_WORDS = JSON.parse('{{ hard_words|escapejs|default:"[]" }}');
        const SYLLABLES = JSON.parse('{{ syllables|escapejs|default:"{}" }}');
    </script>

    <!-- ── WORD POPUP ── -->
    <div id="word-popup" class="popup hidden">
        <div class="popup-content" onclick="event.stopPropagation();">
            <span class="close-btn" onclick="closePopup()">✖</span>
            <h2 id="popup-word"></h2>
            <div id="letter-box"></div>
            <div class="popup-actions">
                <button class="btn-hear" onclick="speakPopupWord()">🔊 Hear Again</button>
                <button class="btn-close" onclick="closePopup()">Close</button>
            </div>
        </div>
    </div>

    <!-- ── FILE NAME FEEDBACK ── -->
    <script>
        document.getElementById('fileInput').addEventListener('change', function () {
            document.getElementById('fileName').textContent =
                this.files[0] ? this.files[0].name : '';
        });
    </script>

    <!-- ── TTS ENGINE (unchanged) ── -->
    <script src="{% static 'js/tts_engine.js' %}"></script>

</body>

</html>
